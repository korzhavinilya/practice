version: '3.7'

networks:
  elk-stack-proxy:
    driver: bridge

services:
  rest-api:
    build:
      context: server
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./server:/home/node/app
    ports:
      - 3001:3001
    command: npm run dev

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    environment:
      - xpack.security.enabled=false
      - 'discovery.type=single-node'
    networks:
      - elk-stack-proxy
    volumes:
      - ./elastic/es-data:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
      - 9300:9300

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.9
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - elk-stack-proxy
    depends_on:
      - elasticsearch
    ports:
      - 5601:5601

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.9
    volumes:
      - ./elastic/logging.conf:/usr/share/logstash/pipeline/logging.conf
      - ./elastic/logstash.yaml:/usr/share/logstash/config/logstash.yml
    depends_on:
      - elasticsearch
    ports:
      - 1514:1514/udp
      - 1515:1515
      - 1515:1515/udp
